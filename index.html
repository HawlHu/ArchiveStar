    // 複製連結功能
    function copyUrl(fileName, btnElement) {
        const fullUrl = CDN_BASE + fileName;
        navigator.clipboard.writeText(fullUrl).then(() => {
            const lang = document.getElementById("lang-selector").value;
            const originalText = btnElement.innerText;
            btnElement.innerText = i18n[lang].copied;
            btnElement.style.backgroundColor = "#17a2b8";
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.backgroundColor = "#28a745";
            }, 2000);
        });
    }

    // 更新介面語言與表格內容
    function changeLanguage() {
        const lang = document.getElementById("lang-selector").value;
        const texts = i18n[lang];

        // 更新靜態文字
        document.getElementById("title").innerText = texts.title;
        document.getElementById("desc").innerText = texts.desc;
        document.getElementById("official-label").innerText = texts.official;
        document.getElementById("th-file").innerText = texts.th_file;
        document.getElementById("th-desc").innerText = texts.th_desc;
        document.getElementById("th-source").innerText = texts.th_source;
        document.getElementById("th-action").innerText = texts.th_action;

        // 重新渲染表格
        const tbody = document.getElementById("file-list");
        tbody.innerHTML = "";

        filesData.forEach(file => {
            const tr = document.createElement("tr");
            
            // 處理來源連結
            let sourceHtml = `<span style="color:#999;">${texts.na}</span>`;
            if (file.source !== "") {
                const domain = new URL(file.source).hostname.replace('www.', '');
                sourceHtml = `<a href="${file.source}" target="_blank" class="source-link">${domain}</a>`;
            }

            tr.innerHTML = `
                <td><strong>${file.name}</strong></td>
                <td>${texts[file.descKey]}</td>
                <td>${sourceHtml}</td>
                <td>
                    <button class="btn-copy" onclick="copyUrl('${file.name}', this)">${texts.copy}</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 初始化頁面
    window.onload = () => {
        changeLanguage();
